<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="glow" cx="80%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#C8A868" stop-opacity=".38"/>
      <stop offset="70%" stop-color="#C8A868" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#C8A868" stop-opacity=".18"/>
      <stop offset="70%" stop-color="#C8A868" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="340" fill="#262626"/>
  <rect width="1200" height="340" fill="url(#glow)"/>
  <rect width="1200" height="340" fill="url(#glow2)"/>

  <!-- ============ LEFT: MAKEUP ============ -->
  <g stroke="#C8A868" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- makeup brush, angled -->
    <g transform="translate(200,170) rotate(-35)">
      <!-- handle -->
      <line x1="0" y1="95" x2="0" y2="10"/>
      <line x1="-7" y1="95" x2="-7" y2="10"/>
      <line x1="7" y1="95" x2="7" y2="10"/>
      <path d="M -7 95 Q 0 104 7 95"/>
      <!-- ferrule -->
      <rect x="-9" y="-14" width="18" height="24" rx="3"/>
      <!-- bristles -->
      <path d="M -9 -14 Q -12 -46 0 -62 Q 12 -46 9 -14 Z" fill="#C8A868" fill-opacity=".22"/>
      <path d="M -3 -18 Q -3 -40 0 -52"/>
      <path d="M 3 -18 Q 3 -40 0 -52" opacity=".6"/>
    </g>

    <!-- lipstick -->
    <g transform="translate(310,190)">
      <rect x="-14" y="18" width="28" height="52" rx="4"/>
      <rect x="-10" y="2" width="20" height="16" rx="2"/>
      <path d="M -8 2 L -8 -30 Q -8 -38 0 -40 L 8 -24 L 8 2 Z" fill="#C8A868" fill-opacity=".3"/>
    </g>

    <!-- sparkle accents -->
    <g stroke-width="2.2" opacity=".85">
      <path d="M 132 78 v 22 M 121 89 h 22"/>
      <path d="M 360 96 v 14 M 353 103 h 14"/>
      <path d="M 165 265 v 14 M 158 272 h 14"/>
    </g>
  </g>

  <!-- ============ CENTER DIVIDER + WORDMARK ============ -->
  <line x1="600" y1="70" x2="600" y2="270" stroke="#C8A868" stroke-width="1" opacity=".5"/>

  <text x="600" y="120" text-anchor="middle" fill="#F7F4EE" font-size="30" letter-spacing="6">MAKEUP</text>
  <text x="600" y="163" text-anchor="middle" fill="#C8A868" font-size="22" font-style="italic" letter-spacing="2">&amp;</text>
  <text x="600" y="205" text-anchor="middle" fill="#F7F4EE" font-size="30" letter-spacing="6">MOBILE TANNING</text>
  <text x="600" y="250" text-anchor="middle" fill="#888A96" font-size="13" letter-spacing="4" font-family="Verdana, sans-serif">ON LOCATION &#8226; TAILORED TO YOU</text>

  <!-- ============ RIGHT: MOBILE SPRAY TANNING ============ -->
  <g stroke="#C8A868" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- airbrush spray gun -->
    <g transform="translate(880,185)">
      <!-- body -->
      <path d="M -40 -6 L 34 -6 Q 44 -6 44 4 L 44 10 Q 44 18 34 18 L 6 18 L -2 52 Q -4 60 -14 60 L -26 60 Q -34 60 -32 50 L -24 18 L -40 18 Q -48 18 -48 6 Q -48 -6 -40 -6 Z"/>
      <!-- cup -->
      <path d="M 2 -6 L 2 -34 Q 2 -40 8 -40 L 20 -40 Q 26 -40 26 -34 L 26 -6" />
      <path d="M 2 -34 h 24"/>
      <!-- nozzle -->
      <line x1="-48" y1="6" x2="-62" y2="6"/>
      <!-- trigger -->
      <path d="M 14 18 Q 12 32 20 36"/>
    </g>

    <!-- mist -->
    <g stroke-width="2.4" opacity=".9">
      <path d="M 800 168 Q 780 162 764 168"/>
      <path d="M 802 186 Q 776 186 758 194" opacity=".7"/>
      <path d="M 800 204 Q 782 210 768 220" opacity=".5"/>
      <circle cx="748" cy="166" r="2" fill="#C8A868" stroke="none"/>
      <circle cx="738" cy="192" r="2.5" fill="#C8A868" stroke="none"/>
      <circle cx="750" cy="222" r="2" fill="#C8A868" stroke="none"/>
      <circle cx="726" cy="176" r="1.6" fill="#C8A868" stroke="none"/>
      <circle cx="728" cy="210" r="1.6" fill="#C8A868" stroke="none"/>
    </g>

    <!-- sun / glow motif -->
    <g transform="translate(1050,110)" stroke-width="2.4">
      <circle r="24"/>
      <g opacity=".85">
        <line x1="0" y1="-34" x2="0" y2="-44"/>
        <line x1="0" y1="34" x2="0" y2="44"/>
        <line x1="-34" y1="0" x2="-44" y2="0"/>
        <line x1="34" y1="0" x2="44" y2="0"/>
        <line x1="24" y1="-24" x2="31" y2="-31"/>
        <line x1="-24" y1="24" x2="-31" y2="31"/>
        <line x1="24" y1="24" x2="31" y2="31"/>
        <line x1="-24" y1="-24" x2="-31" y2="-31"/>
      </g>
    </g>

    <!-- sparkle -->
    <g stroke-width="2.2" opacity=".85">
      <path d="M 1058 252 v 18 M 1049 261 h 18"/>
    </g>
  </g>

  <!-- thin gold frame -->
  <rect x="14" y="14" width="1172" height="312" fill="none" stroke="#C8A868" stroke-width="1" opacity=".45"/>
</svg>
